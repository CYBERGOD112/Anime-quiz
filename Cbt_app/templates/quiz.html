<!DOCTYPE html>
<html>
<head>
    <title>Quiz</title>
</head>
<body>

<div style="
    background: rgba(0, 0, 0, 0.5);
    width: 500px;        /* Fixed width */
    height: 400px;       /* Fixed height */
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.3); /* Box shadow */
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    overflow: auto;      /* Allows scrolling if content exceeds box */
">
    <h2>Question {{ q_num }}</h2>
    <p>{{ question.text }}</p>

    <form method="POST">
        {% for option in question.options %}
            <input type="radio" name="answer" value="{{ option[0] }}" required>
            {{ option }} <br>
        {% endfor %}

        <button type="submit">Next</button>
    </form>
</div>

</body>

</html>
